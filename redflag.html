<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
overflow-x:hidden;
}

/* ESCAPE */
.escape-btn{
position:fixed;
top:20px;
right:20px;
background:#ff3b3b;
color:white;
padding:10px 15px;
font-weight:bold;
border-radius:8px;
text-decoration:none;
box-shadow:0 0 15px red;
z-index:999;
}
.escape-btn:hover{transform:scale(1.1);}

/* PARTICLES */
.particles{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
z-index:-1;
}
.particle{
position:absolute;
width:4px;height:4px;
background:#ffffffaa;
border-radius:50%;
}

/* UI */
h1{margin-top:60px;font-size:38px;text-shadow:2px 2px 10px black;}

#progressContainer{
width:80%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}
#progressBar{
height:100%;
width:0%;
background:#00ff88;
transition:0.4s;
}

#counter{opacity:0.8;margin:10px;}
#question{
font-size:22px;
margin:30px;
min-height:80px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.2s;
}

.red{background:#ff2d2d;color:white;}
.green{background:#00c853;color:white;}
.funBtn{background:black;color:yellow;border:2px solid yellow;}

button:hover{transform:scale(1.1);}

.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
}

.result{
margin-top:30px;
font-size:22px;
}
</style>
</head>

<body>

<a href="index.html" class="escape-btn">⚠ ESCAPE THIS PAGE</a>

<div class="particles" id="particles"></div>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="counter"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>

<div id="result"></div>

<script>

/* SOUNDS */
const correctSound=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b3f1c.mp3?filename=correct-2-46134.mp3");
const wrongSound=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_38b0f8c2cb.mp3?filename=error-126627.mp3");
const booSound=new Audio("https://cdn.pixabay.com/download/audio/2021/08/04/audio_c7a6f6e7d8.mp3?filename=boo-6377.mp3");
const clapSound=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_45b9f38e70.mp3?filename=applause-2-46165.mp3");

/* PARTICLES */
const container=document.getElementById("particles");
for(let i=0;i<60;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*window.innerWidth+"px";
p.style.top=Math.random()*window.innerHeight+"px";
container.appendChild(p);
setInterval(()=>{
p.style.top=(parseFloat(p.style.top)-0.5)+"px";
if(parseFloat(p.style.top)<0)p.style.top=window.innerHeight+"px";
},30);
}

/* QUESTIONS */
let questions=[
{q:"They post 'single life lowkey peaceful' while actively dating you.",correct:"red"},
{q:"They repost relationship quotes but won’t claim you.",correct:"red"},
{q:"They make a playlist named after you.",correct:"green"},
{q:"They start arguments before going out just in case.",correct:"red"},
{q:"They hype your selfies in comments, not just DMs.",correct:"green"},
{q:"They call you bro in public but baby in private.",correct:"red"},
{q:"They actually delete dating apps without you asking.",correct:"green"},
{q:"They say they like crazy people then trigger you on purpose.",correct:"red"}
];

questions.sort(()=>Math.random()-0.5);

let current=0;
let score=0;
let finished=false;

function loadQuestion(){
if(current<questions.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+questions.length;
document.getElementById("question").innerText=
questions[current].q;
updateProgress();
}else{
endGame();
}
}

function answer(choice){
if(finished) return;

if(choice===questions[current].correct){
score++;
correctSound.play();
flash("#00c853");
}else{
wrongSound.play();
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
flash("#ff0000");
}
current++;
setTimeout(loadQuestion,600);
}

function updateProgress(){
let percent=(current/questions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function flash(color){
let old=document.body.style.background;
document.body.style.background=color;
setTimeout(()=>{
document.body.style.background="";
},300);
}

function endGame(){
finished=true;

let total=questions.length;
let quote="";
if(score<=2){
quote="You are romantically blind. Please log off.";
booSound.play();
}
else if(score<=5){
quote="You see some signs… but you still text back.";
}
else{
quote="Certified Red Flag Detector. Emotionally intelligent icon.";
clapSound.play();
}

document.getElementById("result").innerHTML=`
<div class="result">
<h2>${score}/${total}</h2>
<p>${quote}</p>
<button class="funBtn" onclick="location.reload()">Play Again</button>
<button class="funBtn" onclick="shareScore()">Share This Chaos</button>
<button class="funBtn" onclick="sendToThem()">Send To Your Situationship</button>
</div>
`;
}

function shareScore(){
alert("Screenshot your score and post it. Tag your situationship.");
}

function sendToThem(){
alert("Send this link and say 'Be honest.' 😈");
}

loadQuestion();

</script>

</body>
</html>
