<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loadingScreen">
Analyzing your dating instincts...
</div>

<a href="index.html" class="escape-btn">⚠ ESCAPE THIS PAGE</a>

<h1 id="mainTitle">🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="counter"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>

<div id="result"></div>

<div id="typingPopup">💬 Your ex is typing...</div>
<div id="watcherPopup">👁 Someone is watching you play...</div>

<div id="dmBox">
<b>Instagram DM</b>
<hr>
hey... saw your score 👀  
so... was I the red flag?
<br><br>
<button onclick="closeDM()">Close</button>
</div>

<div id="angryPopup">
<b>Instagram DM</b>
<hr>
😡😡 I KNEW IT U WERE THE RED FLAG LOSER 😤🚩
<br><br>
<button onclick="closeAngry()">Close</button>
</div>

<!-- Dad Call UI -->
<div id="dadCall">
  <div id="callCard">
    <h2>📞 Incoming Call</h2>
    <p><b>Dad</b></p>
    <button onclick="acceptCall()">Accept</button>
  </div>
</div>

<script>

/* AUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.addEventListener("click",()=>{
if(audioCtx.state==="suspended") audioCtx.resume();
});

function playTone(freq,duration){
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.frequency.value=freq;
gain.gain.value=0.2;
osc.start();
setTimeout(()=>osc.stop(),duration);
}

function playCorrect(){ playTone(850,150); }
function playWrong(){ playTone(200,200); }
function playNotify(){ playTone(600,120); }

function playHorror(){
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.frequency.value=60;
gain.gain.value=0.4;
osc.start();
setTimeout(()=>osc.stop(),600);
}

function playRingtone(){
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
gain.gain.value=0.3;
osc.start();
let freq=500;
osc.frequency.value=freq;
let interval=setInterval(()=>{
freq=freq===500?650:500;
osc.frequency.value=freq;
},400);
setTimeout(()=>{
clearInterval(interval);
osc.stop();
},4000);
}

/* Loading */
setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none";
document.body.style.overflow="auto";
},1200);

/* Questions */
const questions=[
{q:"They post single life lowkey peaceful while dating you.",correct:"red"},
{q:"They repost relationship quotes but won’t claim you.",correct:"red"},
{q:"They make a playlist named after you.",correct:"green"},
{q:"They start arguments before going out.",correct:"red"},
{q:"They hype your selfies publicly.",correct:"green"},
{q:"They call you bro in public but baby in private.",correct:"red"},
{q:"They delete dating apps without asking.",correct:"green"},
{q:"They trigger you for fun.",correct:"red"}
];

questions.sort(()=>Math.random()-0.5);

let current=0;
let score=0;
let finished=false;

function loadQuestion(){
if(current<questions.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+questions.length;
document.getElementById("question").innerText=
questions[current].q;
updateProgress();
}else{
endGame();
}
}

function answer(choice){
if(finished) return;

if(choice===questions[current].correct){
score++;
playCorrect();
flash("#00c853");
}else{
playWrong();
flash("#ff0000");
}
current++;
setTimeout(loadQuestion,500);
}

function updateProgress(){
let percent=(current/questions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function flash(color){
document.body.style.background=color;
setTimeout(()=>document.body.style.background="",250);
}

/* Confetti */
function launchConfetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* Watcher */
function triggerWatcher(){
let popup=document.getElementById("watcherPopup");
popup.style.display="block";
document.body.classList.add("glitch");
playHorror();
setTimeout(()=>{
popup.style.display="none";
document.body.classList.remove("glitch");
},4000);
}

/* Dad Call */
function triggerDadCall(){
document.getElementById("dadCall").style.display="flex";
document.body.classList.add("shakeScreen");
playRingtone();
}

function acceptCall(){
document.body.classList.remove("shakeScreen");
document.getElementById("dadCall").style.display="none";
playNotify();
alert("Dad: I'm proud of you champ 💛");
}

/* Typing */
function fakeTyping(){
let popup=document.getElementById("typingPopup");
popup.style.display="block";
playNotify();

setTimeout(()=>{
popup.style.display="none";

if(score<5){
document.getElementById("angryPopup").style.display="block";
document.body.classList.add("shakeScreen");
playHorror();
setTimeout(()=>document.body.classList.remove("shakeScreen"),2000);
}else{
document.getElementById("dmBox").style.display="block";
playNotify();
setTimeout(triggerDadCall,2500);
}

},1500);
}

function closeDM(){ document.getElementById("dmBox").style.display="none"; }
function closeAngry(){ document.getElementById("angryPopup").style.display="none"; }

/* Share */
function shareScore(){
let text="I scored "+score+" in Red Flag Detector 😎";
navigator.clipboard.writeText(text);
alert("Copied to clipboard!");
}

/* End */
function endGame(){
finished=true;
let total=questions.length;
let quote="";

if(score<=2){
quote="Romantically blind.";
triggerWatcher();
}
else if(score<=5){
quote="You see the signs… but you still reply fast.";
}
else{
quote="Certified Red Flag Detector.";
launchConfetti();
}

document.getElementById("result").innerHTML=`
<div class="resultCard">
<h2>${score}/${total}</h2>
<p>${quote}</p>
<button class="funBtn" onclick="location.reload()">Play Again</button>
<button class="funBtn" onclick="shareScore()">Share Result</button>
</div>
`;

setTimeout(fakeTyping,2000);
}

/* Easter Egg */
let titleClicks=0;
document.getElementById("mainTitle").addEventListener("click",()=>{
titleClicks++;
if(titleClicks>=5){
alert("SECRET MODE ACTIVATED 🤯");
document.body.style.background="black";
}
});

loadQuestion();

</script>
</body>
</html>
