<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
transition:0.3s;
}

#loadingScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
font-size:26px;
}

.escape-btn{
position:fixed;
top:20px;
right:20px;
background:#ff3b3b;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
}

h1{margin-top:80px;font-size:38px;}

#progressContainer{
width:80%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:#00ff88;
transition:0.4s;
}

#question{font-size:22px;margin:30px;min-height:70px;}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

.red{background:#ff2d2d;color:white;}
.green{background:#00c853;color:white;}
.funBtn{background:black;color:yellow;border:2px solid yellow;}

.resultCard{
margin-top:30px;
padding:20px;
border:2px solid white;
border-radius:15px;
display:inline-block;
background:rgba(0,0,0,0.4);
}

/* Confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 3s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* Fake typing popup */
#typingPopup{
position:fixed;
bottom:30px;
right:30px;
background:#111;
padding:15px;
border-radius:10px;
display:none;
}

/* Lie detector glitch */
.glitch{
animation:glitch 0.2s infinite alternate;
}
@keyframes glitch{
0%{transform:translate(2px,0);}
50%{transform:translate(-2px,0);}
100%{transform:translate(2px,0);}
}

/* Fake DM */
#dmBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:15px;
width:300px;
}
</style>
</head>

<body>

<div id="loadingScreen">
Analyzing your dating instincts...
</div>

<a href="index.html" class="escape-btn">⚠ ESCAPE THIS PAGE</a>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="counter"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>

<div id="result"></div>
<div id="typingPopup">💬 Your ex is typing...</div>

<div id="dmBox">
<b>Instagram DM</b>
<hr>
hey... saw your score 👀  
so... was I the red flag?
<br><br>
<button onclick="closeDM()">Close</button>
</div>

<script>

/* ---------- EMBEDDED SOUND SYSTEM ---------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(type){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);

if(type==="correct"){
osc.frequency.value=800;
gain.gain.value=0.2;
}
if(type==="wrong"){
osc.frequency.value=200;
gain.gain.value=0.3;
}
if(type==="notify"){
osc.frequency.value=600;
gain.gain.value=0.2;
}

osc.start();
setTimeout(()=>osc.stop(),150);
}

/* Loading */
setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none";
document.body.style.overflow="auto";
},1500);

/* Questions */
const questions=[
{q:"They post single life lowkey peaceful while dating you.",correct:"red"},
{q:"They repost relationship quotes but won’t claim you.",correct:"red"},
{q:"They make a playlist named after you.",correct:"green"},
{q:"They start arguments before going out.",correct:"red"},
{q:"They hype your selfies publicly.",correct:"green"},
{q:"They call you bro in public but baby in private.",correct:"red"},
{q:"They delete dating apps without asking.",correct:"green"},
{q:"They trigger you for fun.",correct:"red"}
];

questions.sort(()=>Math.random()-0.5);

let current=0;
let score=0;
let finished=false;

function loadQuestion(){
if(current<questions.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+questions.length;
document.getElementById("question").innerText=
questions[current].q;
updateProgress();
}else{
endGame();
}
}

function answer(choice){
if(finished) return;

if(choice===questions[current].correct){
score++;
playBeep("correct");
flash("#00c853");
}else{
playBeep("wrong");
flash("#ff0000");
}
current++;
setTimeout(loadQuestion,600);
}

function updateProgress(){
let percent=(current/questions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function flash(color){
document.body.style.background=color;
setTimeout(()=>document.body.style.background="",300);
}

/* Confetti */
function launchConfetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* Roast */
const roasts=[
"You fall in love with potential.",
"You ignore red flags like décor.",
"You definitely text first.",
"You think they’ll change.",
"You believe in right person wrong time."
];

/* Fake typing */
function fakeTyping(){
let popup=document.getElementById("typingPopup");
popup.style.display="block";
playBeep("notify");
setTimeout(()=>{
popup.innerText="💬 Your ex sent: 'hey stranger'";
playBeep("notify");
setTimeout(()=>document.getElementById("dmBox").style.display="block",1500);
},3000);
}

function closeDM(){
document.getElementById("dmBox").style.display="none";
}

/* Lie detector */
function lieDetector(){
document.body.classList.add("glitch");
setTimeout(()=>document.body.classList.remove("glitch"),1500);
}

/* End */
function endGame(){
finished=true;

let total=questions.length;
let quote="";

if(score<=2){
quote="Romantically blind.";
lieDetector();
}
else if(score<=5){
quote="You see the signs… but you still reply fast.";
}
else{
quote="Certified Red Flag Detector.";
launchConfetti();
}

let roast=roasts[Math.floor(Math.random()*roasts.length)];

document.getElementById("result").innerHTML=`
<div class="resultCard">
<h2>${score}/${total}</h2>
<p>${quote}</p>
<p style="opacity:0.7;">${roast}</p>
<button class="funBtn" onclick="location.reload()">Play Again</button>
<button class="funBtn" onclick="shareScore(${score})">Share Score</button>
</div>
`;

setTimeout(fakeTyping,4000);
}

function shareScore(s){
let url=window.location.href.split('?')[0]+"?score="+s;
navigator.clipboard.writeText(url);
alert("Link copied 😈");
}

/* Shareable score */
const params=new URLSearchParams(window.location.search);
if(params.get("score")){
document.getElementById("loadingScreen").style.display="none";
score=parseInt(params.get("score"));
current=questions.length;
endGame();
}else{
loadQuestion();
}

</script>

</body>
</html>
