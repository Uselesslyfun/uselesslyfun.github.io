<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
transition:0.4s;
overflow-x:hidden;
}

/* ESCAPE BUTTON */
.escape-btn{
position:fixed;
top:20px;
right:20px;
background:#ff0000;
color:white;
padding:10px 15px;
font-weight:bold;
border-radius:8px;
text-decoration:none;
box-shadow:0 0 15px red;
z-index:999;
transition:0.2s;
}
.escape-btn:hover{transform:scale(1.1);}

/* PARTICLES */
.particles{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}
.particle{
position:absolute;
width:4px;
height:4px;
background:#fff;
border-radius:50%;
opacity:0.6;
}

h1{margin-top:60px;font-size:40px;text-shadow:2px 2px 10px black;}

#progressContainer{
width:80%;
height:10px;
background:rgba(255,255,255,0.2);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}
#progressBar{
height:100%;
width:0%;
background:#00ff88;
transition:0.4s;
}

#counter{opacity:0.8;margin:10px;}
#timer{opacity:0.8;}

#question{font-size:24px;margin:30px;min-height:60px;}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.2s;
}
.red{background:#ff0000;color:white;}
.green{background:#00c853;color:white;}
.modeBtn{background:black;color:yellow;border:2px solid yellow;}

button:hover{transform:scale(1.1);}

.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
}

.dark-mode{
background:#111 !important;
color:#00ffcc;
}

#leaderboard{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

</style>
</head>

<body>

<a href="index.html" class="escape-btn">⚠ ESCAPE THIS PAGE</a>

<div class="particles" id="particles"></div>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="counter"></div>
<div id="timer"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>
<br>
<button class="modeBtn" onclick="startTimeAttack()">⏱ TIME ATTACK</button>
<button class="modeBtn" onclick="toggleDarkMode()">🌙 DARK MODE</button>

<div id="leaderboard"></div>

<script>
/* PARTICLES */
const particleContainer=document.getElementById("particles");
for(let i=0;i<60;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*window.innerWidth+"px";
p.style.top=Math.random()*window.innerHeight+"px";
particleContainer.appendChild(p);
setInterval(()=>{
p.style.top=(parseFloat(p.style.top)-0.5)+"px";
if(parseFloat(p.style.top)<0)
p.style.top=window.innerHeight+"px";
},30);
}

/* QUESTIONS */
let questions=[
{q:"They hide their phone instantly.",correct:"red"},
{q:"They remember your coffee order.",correct:"green"},
{q:"All exes were crazy.",correct:"red"},
{q:"They communicate properly.",correct:"green"},
{q:"They ghost then come back.",correct:"red"},
{q:"They defend you publicly.",correct:"green"},
{q:"They flirt 'as a joke'.",correct:"red"},
{q:"They hype you before big moments.",correct:"green"}
];

let activeSet=questions.sort(()=>Math.random()-0.5);
let current=0;
let score=0;
let timer=0;
let timerInterval=null;

/* LOAD */
function loadQuestion(){
if(current<activeSet.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+activeSet.length;
document.getElementById("question").innerText=
activeSet[current].q;
updateProgress();
}else endGame();
}

/* ANSWER */
function answer(choice){
if(choice===activeSet[current].correct){
score++;
flash("green");
}else{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
flash("darkred");
}
current++;
setTimeout(loadQuestion,600);
}

function updateProgress(){
let percent=(current/activeSet.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

/* END GAME */
function endGame(){
clearInterval(timerInterval);
saveScore(score);
let total=activeSet.length;
let msg=score>total/2?"You see the signs.":"Red flag energy detected.";

document.body.innerHTML+=`
<h2>${score}/${total}</h2>
<p>${msg}</p>
<p>⏱ ${timer}s</p>
<button onclick="location.reload()">Play Again</button>
`;
showLeaderboard();
}

/* TIME ATTACK */
function startTimeAttack(){
timer=0;
timerInterval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText="⏱ "+timer+"s";
},1000);
}

/* FLASH */
function flash(color){
document.body.style.background=color;
setTimeout(()=>{
document.body.style.background=
"linear-gradient(135deg,#ff416c,#ff4b2b)";
},300);
}

/* DARK MODE */
function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
}

/* LEADERBOARD */
function saveScore(s){
let scores=JSON.parse(localStorage.getItem("rfScores"))||[];
scores.push(s);
scores.sort((a,b)=>b-a);
scores=scores.slice(0,5);
localStorage.setItem("rfScores",JSON.stringify(scores));
}

function showLeaderboard(){
let scores=JSON.parse(localStorage.getItem("rfScores"))||[];
let html="<h3>🏆 Local Leaderboard</h3>";
scores.forEach((s,i)=>{
html+=`#${i+1} — ${s}<br>`;
});
document.getElementById("leaderboard").innerHTML=html;
}

loadQuestion();
</script>

</body>
</html>
