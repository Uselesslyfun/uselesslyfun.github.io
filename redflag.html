<!DOCTYPE html>
<html>
<head>
  <title>Red Flag Green Flag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <h1>🚩 Red Flag Green Flag 🟢</h1>
  <button onclick="startGame()">Start Game</button>
  <br><br>
  <button onclick="escapePage()">⚠ ESCAPE THIS PAGE</button>
</div>

<div id="gameScreen" style="display:none;">
  <h2 id="questionCounter"></h2>
  <p id="questionText"></p>

  <button onclick="answer('red')">🚩 Red Flag</button>
  <button onclick="answer('green')">🟢 Green Flag</button>
</div>

<div id="resultScreen" style="display:none;">
  <h2 id="finalScore"></h2>
  <p id="finalQuote"></p>
  <p id="livePlayers"></p>
  <p id="relationshipLabel"></p>

  <button onclick="shareResult()">Share Result</button>
  <button onclick="downloadResultImage()">Download Image</button>
  <button onclick="location.reload()">Play Again</button>
  <button onclick="escapePage()">⚠ ESCAPE THIS PAGE</button>
</div>

<script src="script.js"></script>
</body>
</html>
