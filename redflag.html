<!DOCTYPE html>
<html>
<head>
  <title>🚩 Red Flag or Green Flag</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      transition: background 0.5s ease;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
      text-shadow: 2px 2px 10px black;
    }

    #gameBox {
      margin-top: 60px;
    }

    #counter {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    #question {
      font-size: 24px;
      margin: 20px;
      min-height: 60px;
    }

    button {
      padding: 15px 30px;
      margin: 15px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .red {
      background: #ff0000;
      color: white;
    }

    .green {
      background: #00c853;
      color: white;
    }

    .intenseBtn {
      background: black;
      color: yellow;
      border: 2px solid yellow;
    }

    button:hover {
      transform: scale(1.1);
    }

    #scoreBox {
      font-size: 22px;
      margin-top: 30px;
    }

    #warningBox {
      display: none;
      background: rgba(0,0,0,0.8);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #warningBox button {
      margin-top: 20px;
    }

    #finalScreen {
      margin-top: 40px;
    }
  </style>
</head>
<body>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="gameBox">
  <div id="counter"></div>
  <div id="question"></div>

  <button class="red" onclick="answer('red')">🚩 Red Flag</button>
  <button class="green" onclick="answer('green')">🌿 Green Flag</button>

  <div id="scoreBox"></div>

  <br><br>
  <button class="intenseBtn" onclick="startIntense()">⚠ INTENSE VERSION</button>
</div>

<div id="warningBox">
  <h2>⚠ WARNING ⚠</h2>
  <p>These 5 questions will decide your FATE.</p>
  <p>Are you mentally prepared?</p>
  <button onclick="confirmIntense()">YES. I FEAR NOTHING.</button>
  <button onclick="closeWarning()">No I'm weak.</button>
</div>

<script>
  let normalQuestions = [
    { q: "She still has Tinder installed... just in case.", correct: "red" },
    { q: "He says 'trust me' but hides his phone when you walk in.", correct: "red" },
    { q: "She hangs out alone with her boy bestie every weekend.", correct: "red" },
    { q: "He replies after 6 hours but was online the whole time.", correct: "red" },
    { q: "She posts quotes about 'if he wanted to he would'.", correct: "red" },
    { q: "He remembers your smallest details.", correct: "green" },
    { q: "She defends you in front of others.", correct: "green" },
    { q: "He communicates instead of disappearing.", correct: "green" }
  ];

  let intenseQuestions = [
    { q: "They say all their exes were 'crazy'.", correct: "red" },
    { q: "They say 'I don't believe in labels'.", correct: "red" },
    { q: "They flirt as a 'joke' with others.", correct: "red" },
    { q: "They say 'I’m just bad at texting' but text others instantly.", correct: "red" },
    { q: "They say 'You’re overthinking' every time you question them.", correct: "red" }
  ];

  let current = 0;
  let score = 0;
  let playingIntense = false;
  let activeSet = [];

  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function loadQuestion() {
    if (current < activeSet.length) {
      document.getElementById("counter").innerText =
        "Q" + (current + 1) + " / " + activeSet.length;

      document.getElementById("question").innerText =
        activeSet[current].q;
    } else {
      endGame();
    }
  }

  function answer(choice) {
    if (choice === activeSet[current].correct) {
      score++;
      flash("green");
      playSound(true);
    } else {
      flash("darkred");
      playSound(false);
    }

    current++;
    setTimeout(loadQuestion, 800);
  }

  function endGame() {
    let tagline = "";

    let total = activeSet.length;

    if (score <= 1) tagline = "Certified walking red flag.";
    else if (score <= 3) tagline = "You need relationship supervision.";
    else if (score <= total - 2) tagline = "Emotionally questionable.";
    else if (score < total) tagline = "You see the signs… mostly.";
    else tagline = "Green Flag Detector Master.";

    document.getElementById("gameBox").innerHTML = `
      <div id="finalScreen">
        <h2>${score} / ${total}</h2>
        <p>${tagline}</p>
        <br>
        <button onclick="location.reload()">Play Again</button>
      </div>
    `;
  }

  function startIntense() {
    document.getElementById("warningBox").style.display = "flex";
  }

  function confirmIntense() {
    playingIntense = true;
    current = 0;
    score = 0;
    activeSet = shuffle([...intenseQuestions]);
    document.getElementById("warningBox").style.display = "none";
    loadQuestion();
  }

  function closeWarning() {
    document.getElementById("warningBox").style.display = "none";
  }

  function flash(color) {
    document.body.style.background = color;
    setTimeout(() => {
      document.body.style.background =
        "linear-gradient(135deg, #ff416c, #ff4b2b)";
    }, 300);
  }

  function playSound(correct) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.type = "sawtooth";

    if (correct) {
      osc.frequency.setValueAtTime(800, audioContext.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1400, audioContext.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(300, audioContext.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.4);
    }

    gain.gain.setValueAtTime(1, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.6);

    osc.start();
    osc.stop(audioContext.currentTime + 0.6);
  }

  // INITIAL START
  activeSet = shuffle([...normalQuestions]);
  loadQuestion();
</script>

</body>
</html>
