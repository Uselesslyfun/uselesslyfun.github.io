<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* LOADING SCREEN */
#loadingScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
font-size:28px;
letter-spacing:2px;
}

/* ESCAPE */
.escape-btn{
position:fixed;
top:20px;
right:20px;
background:#ff3b3b;
color:white;
padding:10px 15px;
font-weight:bold;
border-radius:8px;
text-decoration:none;
box-shadow:0 0 15px red;
z-index:999;
}

/* PARTICLES */
.particles{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
z-index:-1;
}
.particle{
position:absolute;
width:4px;height:4px;
background:#ffffffaa;
border-radius:50%;
}

/* TITLE ANIMATION */
h1{
margin-top:80px;
font-size:40px;
opacity:0;
transform:translateY(-20px);
animation:fadeIn 1s forwards 2s;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

/* GAME */
#progressContainer{
width:80%;
height:10px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}
#progressBar{
height:100%;
width:0%;
background:#00ff88;
transition:0.4s;
}

#counter{margin:10px;}
#question{font-size:22px;margin:30px;min-height:80px;}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.2s;
}

.red{background:#ff2d2d;color:white;}
.green{background:#00c853;color:white;}
.funBtn{background:black;color:yellow;border:2px solid yellow;}

button:hover{transform:scale(1.1);}

.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
}

.resultCard{
margin-top:30px;
padding:20px;
border:2px solid white;
border-radius:15px;
display:inline-block;
background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div id="loadingScreen">
Analyzing your dating instincts...
<div style="margin-top:20px;font-size:14px;opacity:0.6;">Please don’t lie.</div>
</div>

<a href="index.html" class="escape-btn">⚠ ESCAPE THIS PAGE</a>

<div class="particles" id="particles"></div>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="counter"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>

<div id="result"></div>

<script>

/* ---------- FIXED SOUNDS ---------- */
const correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const booSound = new Audio("https://actions.google.com/sounds/v1/crowds/boo.ogg");
const clapSound = new Audio("https://actions.google.com/sounds/v1/crowds/applause.ogg");

function playSound(sound){
sound.currentTime = 0;
sound.play().catch(()=>{});
}

/* ---------- LOADING ---------- */
setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none";
document.body.style.overflow="auto";
},2000);

/* ---------- PARTICLES ---------- */
const container=document.getElementById("particles");
for(let i=0;i<50;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*window.innerWidth+"px";
p.style.top=Math.random()*window.innerHeight+"px";
container.appendChild(p);
setInterval(()=>{
p.style.top=(parseFloat(p.style.top)-0.4)+"px";
if(parseFloat(p.style.top)<0)p.style.top=window.innerHeight+"px";
},30);
}

/* ---------- DAILY ROTATION ---------- */
const baseQuestions=[
{q:"They post single life lowkey peaceful while dating you.",correct:"red"},
{q:"They repost relationship quotes but won’t claim you.",correct:"red"},
{q:"They make a playlist named after you.",correct:"green"},
{q:"They start arguments before going out.",correct:"red"},
{q:"They hype your selfies publicly.",correct:"green"},
{q:"They call you bro in public but baby in private.",correct:"red"},
{q:"They delete dating apps without asking.",correct:"green"},
{q:"They trigger you for fun.",correct:"red"}
];

let today=new Date().getDate();
let questions=[...baseQuestions].sort(()=>0.5-Math.sin(today));
let current=0;
let score=0;
let finished=false;

/* ---------- LOAD ---------- */
function loadQuestion(){
if(current<questions.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+questions.length;
document.getElementById("question").innerText=
questions[current].q;
updateProgress();
}else{
endGame();
}
}

/* ---------- ANSWER ---------- */
function answer(choice){
if(finished) return;

if(choice===questions[current].correct){
score++;
playSound(correctSound);
flash("#00c853");
}else{
playSound(wrongSound);
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
flash("#ff0000");
}
current++;
setTimeout(loadQuestion,600);
}

function updateProgress(){
let percent=(current/questions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function flash(color){
let old=document.body.style.background;
document.body.style.background=color;
setTimeout(()=>document.body.style.background="",300);
}

/* ---------- RESULT ---------- */
function endGame(){
finished=true;

let total=questions.length;
let quote="";

if(score<=2){
quote="You are romantically blind.";
playSound(booSound);
}
else if(score<=5){
quote="You see the signs… but you still reply fast.";
}
else{
quote="Certified Red Flag Detector.";
playSound(clapSound);
}

document.getElementById("result").innerHTML=`
<div class="resultCard">
<h2>${score}/${total}</h2>
<p>${quote}</p>
<button class="funBtn" onclick="location.reload()">Play Again</button>
<button class="funBtn" onclick="shareScore(${score})">Share Score</button>
</div>
`;
}

/* ---------- SHAREABLE LINK ---------- */
function shareScore(s){
let url=window.location.origin+window.location.pathname+"?score="+s;
navigator.clipboard.writeText(url);
alert("Link copied. Send it to them 😈");
}

/* AUTO RESULT IF URL HAS SCORE */
const params=new URLSearchParams(window.location.search);
if(params.get("score")){
document.getElementById("loadingScreen").style.display="none";
document.body.style.overflow="auto";
score=parseInt(params.get("score"));
current=baseQuestions.length;
endGame();
}else{
loadQuestion();
}

</script>

</body>
</html>
