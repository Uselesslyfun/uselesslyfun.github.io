<!DOCTYPE html>
<html>
<head>
<title>🚩 Red Flag or Green Flag</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
transition:0.4s;
overflow-x:hidden;
}

h1{margin-top:30px;font-size:40px;text-shadow:2px 2px 10px black;}

#progressContainer{
width:80%;
height:10px;
background:rgba(255,255,255,0.2);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:#00ff88;
transition:0.4s;
}

#counter{opacity:0.8;margin:10px;}

#question{font-size:24px;margin:30px;min-height:60px;}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.2s;
}

.red{background:#ff0000;color:white;}
.green{background:#00c853;color:white;}
.modeBtn{background:black;color:yellow;border:2px solid yellow;}

button:hover{transform:scale(1.1);}

.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
}

.fire{
position:fixed;
bottom:0;
width:100%;
height:200px;
background:radial-gradient(circle at 50% 100%,orange,red,transparent);
animation:fireRise 1s infinite alternate;
pointer-events:none;
}
@keyframes fireRise{
from{transform:translateY(20px);opacity:0.7;}
to{transform:translateY(-10px);opacity:1;}
}

#warningBox{
display:none;
background:rgba(0,0,0,0.9);
position:fixed;
top:0;left:0;width:100%;height:100%;
justify-content:center;
align-items:center;
flex-direction:column;
}

#timer{margin-top:10px;font-size:18px;opacity:0.8;}
#achievements{margin-top:20px;font-size:14px;opacity:0.9;}
</style>
</head>

<body>

<h1>🚩 RED FLAG OR GREEN FLAG 🌿</h1>

<div id="progressContainer"><div id="progressBar"></div></div>

<div id="counter"></div>
<div id="timer"></div>
<div id="question"></div>

<button class="red" onclick="answer('red')">🚩 Red Flag</button>
<button class="green" onclick="answer('green')">🌿 Green Flag</button>
<br>
<button class="modeBtn" onclick="startIntense()">⚠ INTENSE</button>
<button class="modeBtn" onclick="startTimeAttack()">⏱ TIME ATTACK</button>
<button class="modeBtn" onclick="toggleMusic()">🎵 MUSIC</button>

<div id="achievements"></div>

<div id="warningBox">
<h2>⚠ WARNING ⚠</h2>
<p>These questions will decide your FATE.</p>
<button onclick="confirmIntense()">YES. I FEAR NOTHING.</button>
<button onclick="closeWarning()">No I'm weak.</button>
</div>

<script>
let normalQuestions=[
{q:"She still has Tinder installed... just in case.",correct:"red"},
{q:"He hides his phone when you walk in.",correct:"red"},
{q:"She hangs out with her boy bestie every weekend.",correct:"red"},
{q:"He replies after 6 hours but was online.",correct:"red"},
{q:"She posts relationship quotes daily.",correct:"red"},
{q:"He remembers your smallest details.",correct:"green"},
{q:"She defends you publicly.",correct:"green"},
{q:"He communicates instead of disappearing.",correct:"green"}
];

let intenseQuestions=[
{q:"All their exes were crazy.",correct:"red"},
{q:"They flirt as a joke.",correct:"red"},
{q:"They don't believe in labels.",correct:"red"},
{q:"They're bad at texting but text others instantly.",correct:"red"},
{q:"You're always 'overthinking'.",correct:"red"}
];

let secretQuestions=[
{q:"They ghost then say 'I was healing'.",correct:"red"},
{q:"They remember your coffee order.",correct:"green"},
{q:"They clap when plane lands.",correct:"red"},
{q:"They send memes mid-argument.",correct:"green"}
];

let activeSet=[];
let current=0;
let score=0;
let timer=0;
let timerInterval=null;
let timeAttack=false;
let musicPlaying=false;
let bgOsc=null;

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function updateProgress(){
let percent=(current/activeSet.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function loadQuestion(){
if(current<activeSet.length){
document.getElementById("counter").innerText=
"Q"+(current+1)+" / "+activeSet.length;
document.getElementById("question").innerText=
activeSet[current].q;
updateProgress();
}else endGame();
}

function answer(choice){
if(choice===activeSet[current].correct){
score++;
flash("green");
playSound(true);
}else{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
flash("darkred");
playSound(false);
}
current++;
setTimeout(loadQuestion,700);
}

function endGame(){
clearInterval(timerInterval);
updateProgress();

let total=activeSet.length;
let tagline="";
let achievement="";

if(score===total){
tagline="PERFECT SCORE. YOU ARE ELITE.";
achievement="🏆 Achievement Unlocked: Relationship God";
document.body.innerHTML+="<div class='fire'></div>";
}
else if(score>total/2){
tagline="You see the signs... mostly.";
achievement="🥈 Decent Judge";
}
else{
tagline="Certified walking red flag.";
achievement="💀 Needs Therapy";
}

if(timeAttack && timer<=10){
achievement+="<br>⚡ Speed Demon";
}

if(score===total && total===intenseQuestions.length){
achievement+="<br>🔓 Secret Mode Unlocked!";
}

let fakePlayers=1000+Math.floor(Math.random()*5000);
let fakePercent=5+Math.floor(Math.random()*25);

document.body.innerHTML=`
<h2>${score} / ${total}</h2>
<p>${tagline}</p>
<p>${achievement}</p>
<p style="opacity:0.7;margin-top:20px;">
🌍 ${fakePlayers} played today<br>
🔥 Only ${fakePercent}% scored this high
</p>
<p>⏱ Time: ${timer}s</p>
<button onclick="location.reload()">Play Again</button>
<button onclick="shareResult(${score},${total})">Share</button>
`;
}

function shareResult(s,t){
let text="I scored "+s+"/"+t+" on Red Flag or Green Flag 😈";
navigator.clipboard.writeText(text);
alert("Copied to clipboard!");
}

function startIntense(){
document.getElementById("warningBox").style.display="flex";
}

function confirmIntense(){
activeSet=shuffle([...intenseQuestions]);
current=0;score=0;timeAttack=false;
timer=0;
document.getElementById("warningBox").style.display="none";
loadQuestion();
}

function closeWarning(){
document.getElementById("warningBox").style.display="none";
}

function startTimeAttack(){
timeAttack=true;
activeSet=shuffle([...normalQuestions]);
current=0;score=0;timer=0;
timerInterval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText="⏱ "+timer+"s";
},1000);
loadQuestion();
}

function toggleMusic(){
if(!musicPlaying){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
bgOsc=ctx.createOscillator();
const gain=ctx.createGain();
bgOsc.connect(gain);
gain.connect(ctx.destination);
bgOsc.type="sine";
bgOsc.frequency.setValueAtTime(120,ctx.currentTime);
gain.gain.setValueAtTime(0.05,ctx.currentTime);
bgOsc.start();
musicPlaying=true;
}else{
bgOsc.stop();
musicPlaying=false;
}
}

function flash(color){
document.body.style.background=color;
setTimeout(()=>{
document.body.style.background=
"linear-gradient(135deg,#ff416c,#ff4b2b)";
},300);
}

function playSound(correct){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.connect(gain);gain.connect(ctx.destination);
osc.type="sawtooth";
if(correct){
osc.frequency.setValueAtTime(800,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(1400,ctx.currentTime+0.2);
}else{
osc.frequency.setValueAtTime(300,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+0.4);
}
gain.gain.setValueAtTime(1,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
osc.start();osc.stop(ctx.currentTime+0.6);
}

activeSet=shuffle([...normalQuestions]);
loadQuestion();
</script>

</body>
</html>
